  if (state.view === 'study' && state.study) {
    app.innerHTML = renderStudyView();
  } else if (state.view === 'manage') {
    app.innerHTML = renderManageView();
  } else if (state.view === 'reader') {
    app.innerHTML = renderReaderView();
  } else if (state.view === 'drive') {
    app.innerHTML = renderDriveView();
  } else {
    app.innerHTML = renderDecksView();
  }
  renderToast();
}

function postRender() {
  if (state.view === 'drive' && (state.prefs.driveDisplayMode || 'slide') === 'script') {
    const active = document.querySelector('[data-drive-current="true"]');
    if (active && typeof active.scrollIntoView === 'function') {
      active.scrollIntoView({ block: 'nearest', behavior: state.drive.playing ? 'smooth' : 'auto' });
    }
  }
}

function render() {
  renderApp();
  requestAnimationFrame(postRender);
}

const state = {
  data: loadData(),
  prefs: loadPrefs(),
  view: 'decks',
  activeDeckId: null,
  study: null,
  reader: {
    deckId: null,
    title: '',
    text: '',
    picks: [],
  },
  drive: {
    deckId: null,
    queue: [],
    index: 0,
    playing: false,
    runToken: 0,
    timerId: null,
    activeCardId: null,
    activePartIndex: 0,
  },
  manage: {
    addOpen: false,
    importOpen: false,
    editingCardId: null,
  },
  voices: [],
  toast: '',
  toastTimer: null,
};

saveData(state.data);
savePrefs(state.prefs);

document.addEventListener('click', async (event) => {
  const target = event.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;

  if (action === 'new-deck') {
    const name = window.prompt('デッキ名を入力してください', '仕事英語 カスタム');
    if (name && name.trim()) {
      const deck = createDeck(name.trim());
      state.activeDeckId = deck.id;
      state.view = 'manage';
      state.manage = { addOpen: false, importOpen: false, editingCardId: null };
      render();
      showToast('新しいデッキを作成しました');
    }
    return;
  }

  if (action === 'export-all') {
    exportBackup();
    showToast('全体バックアップを書き出しました');
    return;
  }

  if (action === 'open-study') {
    stopDrivePlayback(false);
    startStudy(target.dataset.deckId);
    return;
  }

  if (action === 'open-manage') {
    stopDrivePlayback(false);
    state.activeDeckId = target.dataset.deckId;
    state.view = 'manage';
    state.manage = { addOpen: false, importOpen: false, editingCardId: null };
    render();
    return;
  }

  if (action === 'open-reader') {
    stopDrivePlayback(false);
    state.view = 'reader';
    if (target.dataset.deckId) {
      state.reader.deckId = target.dataset.deckId;
    }
    ensureReaderDeckId();
    render();
    return;
  }

  if (action === 'open-drive') {
    openDrive(target.dataset.deckId || null);
    return;
  }

  if (action === 'go-decks') {
    stopDrivePlayback(false);
    stopSpeech();
    state.view = 'decks';
    state.study = null;
    state.activeDeckId = null;
    state.manage = { addOpen: false, importOpen: false, editingCardId: null };
    render();
    return;
  }

  if (action === 'toggle-add-form') {
    state.manage.addOpen = !state.manage.addOpen;
    if (state.manage.addOpen) state.manage.importOpen = false;
    render();
    return;
  }

  if (action === 'toggle-import-form') {
    state.manage.importOpen = !state.manage.importOpen;
    if (state.manage.importOpen) state.manage.addOpen = false;
    render();
    return;
  }

  if (action === 'copy-import-prompt') {
    try {
      await copyText(target.dataset.prompt || '');
      showToast('プロンプトをコピーしました');
    } catch (err) {
      showToast('コピーに失敗しました');
    }
    return;
  }

  if (action === 'rename-deck') {
    const deck = getDeck(target.dataset.deckId);
    const name = window.prompt('新しいデッキ名', deck ? deck.name : '');
    if (name && name.trim()) {
      updateDeck(target.dataset.deckId, { name: name.trim() });
      render();
      showToast('デッキ名を更新しました');
    }
    return;
  }

  if (action === 'delete-deck') {
    if (window.confirm('このデッキを削除しますか？')) {
      deleteDeck(target.dataset.deckId);
      state.view = 'decks';
      state.activeDeckId = null;
      render();
      showToast('デッキを削除しました');
    }
    return;
  }

  if (action === 'reset-progress') {
    if (window.confirm('このデッキの学習進捗をリセットしますか？')) {
      resetProgress(target.dataset.deckId);
      if (state.study && state.study.deckId === target.dataset.deckId) state.study = createStudySession(target.dataset.deckId);
      render();
      showToast('進捗をリセットしました');
    }
    return;
  }

  if (action === 'export-deck') {
    exportBackup(target.dataset.deckId);
    showToast('デッキのバックアップを書き出しました');
    return;
  }

  if (action === 'open-edit-card') {
    state.manage.editingCardId = target.dataset.cardId;
    render();
    return;
  }

  if (action === 'close-edit-modal') {
    state.manage.editingCardId = null;
    render();
    return;
  }

  if (action === 'delete-card') {
    if (window.confirm('このカードを削除しますか？')) {
      deleteCard(target.dataset.deckId, target.dataset.cardId);
      render();
      showToast('カードを削除しました');
    }
    return;
  }

  if (action === 'toggle-star-manage') {
    const deckId = target.dataset.deckId;
    const deck = getDeck(deckId);
    const card = deck.cards.find(item => item.id === target.dataset.cardId);
    if (card) {
      updateCard(deckId, card.id, { starred: !card.starred });
      render();
    }
    return;
  }

  if (action === 'toggle-star') {
    const card = currentCard();
    if (card) {
      updateCard(state.study.deckId, card.id, { starred: !card.starred });
      render();
      showToast(card.starred ? '苦手マークを外しました' : '苦手マークを付けました');
    }
    return;
  }

  if (action === 'toggle-audio-settings') {
    state.study.settingsOpen = !state.study.settingsOpen;
    render();
    return;
  }

  if (action === 'refresh-voices') {
    refreshVoices();
    showToast('音声一覧を更新しました');
    return;
  }

  if (action === 'toggle-pref') {
    const key = target.dataset.key;
    state.prefs[key] = !state.prefs[key];
    savePrefs(state.prefs);
    render();
    return;
  }

  if (action === 'set-pref') {
    const group = target.dataset.group;
    const value = target.dataset.value;
    state.prefs[group] = value;
    savePrefs(state.prefs);
    if (group === 'source' || group === 'kindFilter') {
      rebuildStudySession();
    } else if (group === 'driveSource' || group === 'driveKindMode') {
      stopDrivePlayback(false);
      rebuildDriveSession({ keepCurrent: true });
    } else {
      if (state.study) resetCurrentStudyCardState();
      render();
    }
    return;
  }

  if (action === 'test-en-voice') {
    speakText('This is the English voice for your driving mode.', {
      lang: 'en',
      rate: Number(state.prefs.driveEnRate || 0.92),
      voiceURI: state.prefs.voiceURI,
      quiet: true,
    });
    return;
  }

  if (action === 'test-jp-voice') {
    speakText('これは運転モードの日本語音声テストです。', {
      lang: 'ja',
      rate: Number(state.prefs.driveJaRate || 1),
      voiceURI: state.prefs.jpVoiceURI,
      quiet: true,
    });
    return;
  }

  if (action === 'drive-play') {
    if (!state.drive.playing && state.drive.index >= (state.drive.queue || []).length) {
      state.drive.index = 0;
    }
    playDriveFromCurrent();
    return;
  }

  if (action === 'drive-stop') {
    stopDrivePlayback();
    return;
  }

  if (action === 'drive-prev') {
    driveJumpTo(state.drive.index - 1, state.drive.playing);
    return;
  }

  if (action === 'drive-next') {
    driveJumpTo(state.drive.index + 1, state.drive.playing);
    return;
  }

  if (action === 'drive-restart') {
    driveJumpTo(0, false);
    return;
  }

  if (action === 'drive-jump') {
    driveJumpTo(Number(target.dataset.index || 0), state.drive.playing);
    return;
  }

  if (action === 'cycle-prev') {
    moveCycle(-1);
    return;
  }

  if (action === 'cycle-next') {
    moveCycle(1);
    return;
  }

  if (action === 'reader-apply-text') {
    const titleInput = document.getElementById('reader-title');
    const textInput = document.getElementById('reader-text');
    const nextTitle = titleInput ? titleInput.value : state.reader.title;
    const nextText = textInput ? textInput.value : state.reader.text;
    const changed = nextText !== state.reader.text;
    state.reader.title = nextTitle;
    state.reader.text = nextText;
    if (changed) state.reader.picks = [];
    render();
    return;
  }

  if (action === 'reader-clear-picks') {
    state.reader.picks = [];
    render();
    return;
  }

  if (action === 'reader-copy-picks') {
    try {
      await copyText(buildReaderGptPrompt());
      showToast('GPT用プロンプトをコピーしました');
    } catch (err) {
      showToast('コピーに失敗しました');
    }
    return;
  }

  if (action === 'reader-save-draft') {
    ensureReaderDeckId();
    const deck = getDeck(state.reader.deckId);
    if (!deck) {
      showToast('保存先デッキが見つかりません');
      return;
    }
    const existingKeys = new Set((deck.cards || []).map(card => readerTokenKey(card.word)));
    const additions = [];
    (state.reader.picks || []).forEach(token => {
      const key = readerTokenKey(token);
      if (!key || existingKeys.has(key)) return;
      const snippet = findReaderSnippet(state.reader.text, token);
      additions.push(normalizeCard({
        kind: key.includes(' ') ? 'phrase' : 'word',
        word: token,
        meaning: '意味をあとで追加',
        examples: snippet ? [{ en: snippet, jp: '' }] : [],
        note: state.reader.title ? `読書メモ: ${state.reader.title}` : '読書メモから追加',
        tip: key.includes(' ') ? '本文から拾った意味のまとまりです。' : undefined,
        status: 'new',
      }));
      existingKeys.add(key);
    });
    if (!additions.length) {
      showToast('新しく追加する項目はありませんでした');
      return;
    }
    addCardsToDeck(deck.id, additions);
    showToast(`${additions.length}件を下書きとして追加しました`);
    return;
  }

  if (action === 'reader-add-phrase') {
    const phrase = target.dataset.phrase || target.dataset.token || '';
    const key = readerTokenKey(phrase);
    if (!key) return;
    if (!(state.reader.picks || []).some(item => readerTokenKey(item) === key)) {
      state.reader.picks = [...(state.reader.picks || []), phrase];
      render();
      showToast('まとまり候補を追加しました');
    }
    return;
  }

  if (action === 'reader-toggle-pick') {
    const token = target.dataset.token || '';
    const key = readerTokenKey(token);
    if (!key || (!key.includes(' ') && shouldReaderIgnoreToken(key))) return;
    const existing = (state.reader.picks || []).find(item => readerTokenKey(item) === key);
    if (existing) {
      state.reader.picks = state.reader.picks.filter(item => readerTokenKey(item) !== key);
    } else {
      state.reader.picks = [...(state.reader.picks || []), token];
    }
    render();
    return;
  }

  if (action === 'reveal-answer') {
    state.study.revealed = true;
    state.study.checked = true;
    if (state.prefs.autoPlay) {
      const card = currentCard();
      const answer = getAnswerSide(card);
      speakText(answer.main);
    }
    render();
    return;
  }

  if (action === 'check-typing') {
    const input = document.getElementById('typing-answer');
    state.study.typingValue = input ? input.value : state.study.typingValue;
    const card = currentCard();
    state.study.evaluation = evaluateTyping(state.study.typingValue, card);
    state.study.checked = true;
    state.study.revealed = true;
    render();
    if (state.prefs.autoPlay) {
      const answer = getAnswerSide(card);
      speakText(answer.main);
    }
    return;
  }

  if (action === 'rate-card') {
    finishCurrentCard(target.dataset.grade);
    return;
  }

  if (action === 'restart-session') {
    state.study = createStudySession(state.study.deckId);
    render();
    return;
  }

  if (action === 'speak-text') {
    speakText(target.dataset.text || '');
    return;
  }

  if (action === 'speak-text-slow') {
    speakText(target.dataset.text || '', { slow: true });
    return;
  }

  if (action === 'speak-text-shadow') {
    speakShadow(target.dataset.text || '');
    return;
  }

  if (action === 'stop-speech') {
    stopSpeech();
    return;
  }

  if (action === 'speak-example' || action === 'speak-example-slow') {
    const card = currentCard();
    const idx = Number(target.dataset.exampleIndex);
    const example = card && card.examples[idx];
    if (example) speakText(example.en, { slow: action === 'speak-example-slow' });
    return;
  }
});

document.addEventListener('change', (event) => {
  const target = event.target;
  if (target.id === 'voice-select') {
    state.prefs.voiceURI = target.value;
    savePrefs(state.prefs);
    showToast('音声を変更しました');
    return;
  }
  if (target.id === 'drive-en-voice-select') {
    state.prefs.voiceURI = target.value;
    savePrefs(state.prefs);
    render();
    showToast('英語の声を変更しました');
    return;
  }
  if (target.id === 'drive-jp-voice-select') {
    state.prefs.jpVoiceURI = target.value;
    savePrefs(state.prefs);
    render();
    showToast('日本語の声を変更しました');
    return;
  }
  if (target.id === 'reader-deck-select') {
    state.reader.deckId = target.value;
    render();
    return;
  }
  if (target.id === 'drive-deck-select') {
    stopDrivePlayback(false);
    state.drive.deckId = target.value;
    state.activeDeckId = target.value;
    rebuildDriveSession({ keepCurrent: false });
    return;
  }
});

document.addEventListener('input', (event) => {
  const target = event.target;
  if (target.id === 'typing-answer') {
    state.study.typingValue = target.value;
    return;
  }
  if (target.id === 'rate-range') {
    state.prefs.rate = Number(target.value);
    savePrefs(state.prefs);
    const label = document.getElementById('rate-label');
    if (label) label.textContent = state.prefs.rate.toFixed(2);
    return;
  }
  if (target.id === 'slow-rate-range') {
    state.prefs.slowRate = Number(target.value);
    savePrefs(state.prefs);
    const label = document.getElementById('slow-rate-label');
    if (label) label.textContent = state.prefs.slowRate.toFixed(2);
    return;
  }
  if (target.id === 'drive-en-rate-range') {
    state.prefs.driveEnRate = Number(target.value);
    savePrefs(state.prefs);
    const label = document.getElementById('drive-en-rate-label');
    if (label) label.textContent = state.prefs.driveEnRate.toFixed(2);
    return;
  }
  if (target.id === 'drive-ja-rate-range') {
    state.prefs.driveJaRate = Number(target.value);
    savePrefs(state.prefs);
    const label = document.getElementById('drive-ja-rate-label');
    if (label) label.textContent = state.prefs.driveJaRate.toFixed(2);
    return;
  }
  if (target.id === 'drive-gap-range') {
    state.prefs.drivePauseMs = Number(target.value);
    savePrefs(state.prefs);
    const label = document.getElementById('drive-gap-label');
    if (label) label.textContent = `${(state.prefs.drivePauseMs / 1000).toFixed(1)}秒`;
    return;
  }
});

document.addEventListener('submit', (event) => {
  if (event.target.id === 'add-card-form') {
    event.preventDefault();
    const form = new FormData(event.target);
    const card = normalizeCard({
      kind: form.get('kind') || '',
      word: form.get('word'),
      meaning: form.get('meaning'),
      examples: [
        form.get('example1en') ? { en: form.get('example1en'), jp: form.get('example1jp') } : null,
        form.get('example2en') ? { en: form.get('example2en'), jp: form.get('example2jp') } : null,
      ].filter(Boolean),
      note: form.get('note') || '',
      status: 'new',
    });
    addCardsToDeck(state.activeDeckId, [card]);
    state.manage.addOpen = false;
    render();
    showToast('カードを追加しました');
    return;
  }

  if (event.target.id === 'import-cards-form') {
    event.preventDefault();
    const form = new FormData(event.target);
    const cards = parseImport(form.get('importText'));
    if (!cards.length) {
      showToast('取り込める形式を認識できませんでした');
      return;
    }
    addCardsToDeck(state.activeDeckId, cards);
    state.manage.importOpen = false;
    render();
    showToast(`${cards.length}件を追加しました`);
    return;
  }

  if (event.target.id === 'edit-card-form') {
    event.preventDefault();
    const cardId = event.target.dataset.cardId;
    const form = new FormData(event.target);
    updateCard(state.activeDeckId, cardId, {
      kind: form.get('kind') || '',
      word: form.get('word'),
      meaning: form.get('meaning'),
      examples: [
        form.get('example1en') ? { en: form.get('example1en'), jp: form.get('example1jp') } : null,
        form.get('example2en') ? { en: form.get('example2en'), jp: form.get('example2jp') } : null,
      ].filter(Boolean),
      note: form.get('note') || '',
    });
    state.manage.editingCardId = null;
    render();
    showToast('カードを更新しました');
  }
});

window.addEventListener('keydown', (event) => {
  if (state.view === 'study' && state.study) {
    if (event.key === 'Enter' && state.prefs.answerMode === 'typing' && !event.shiftKey) {
      const active = document.activeElement;
      if (active && active.id === 'typing-answer') {
        event.preventDefault();
        const button = document.querySelector('[data-action="check-typing"]');
        if (button) button.click();
      }
    }
    if (event.key === ' ' && state.prefs.answerMode !== 'typing') {
      event.preventDefault();
      if (!state.study.revealed) {
        state.study.revealed = true;
        state.study.checked = true;
        if (state.prefs.autoPlay) {
          const card = currentCard();
          const answer = getAnswerSide(card);
          speakText(answer.main);
        }
        render();
      }
    }
    if (state.prefs.progression === 'cycle' && event.key === 'ArrowRight') {
      event.preventDefault();
      moveCycle(1);
    }
    if (state.prefs.progression === 'cycle' && event.key === 'ArrowLeft') {
      event.preventDefault();
      moveCycle(-1);
    }
  }

  if (event.key === 'Escape' && state.manage.editingCardId) {
    state.manage.editingCardId = null;
    render();
  }
});

refreshVoices();
if ('speechSynthesis' in window && typeof window.speechSynthesis.onvoiceschanged !== 'undefined') {
  window.speechSynthesis.onvoiceschanged = refreshVoices;
}
setTimeout(refreshVoices, 800);

render();
</script>
</body>
</html>
