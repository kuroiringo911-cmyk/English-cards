<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#efe9dc">
<title>仕事英語カード</title>
<style>
:root{
  --bg:#efe9dc;
  --paper:#fbf7ee;
  --line:#ded4bf;
  --line-strong:#c7baa0;
  --text:#1f1a14;
  --muted:#756a5a;
  --accent:#2f5a4b;
  --accent-soft:#e4efe9;
  --warn:#b65b3c;
  --warn-soft:#f7e5df;
  --gold:#8b6f2b;
  --gold-soft:#f6efd9;
  --shadow:0 18px 40px rgba(31,26,20,0.08);
  --radius:22px;
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Hiragino Sans","Yu Gothic","Meiryo",sans-serif;-webkit-font-smoothing:antialiased;min-height:100%}
body{padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}
button,input,textarea,select{font:inherit}
button{cursor:pointer;border:none;background:none}
a{color:inherit}
#app{min-height:100vh}
.screen{max-width:920px;margin:0 auto;padding:18px 16px 40px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
.topbar h1,.topbar h2{margin:0;font-size:20px;line-height:1.2}
.eyebrow{color:var(--muted);font-size:11px;letter-spacing:.14em;text-transform:uppercase}
.hero{padding:10px 0 12px}
.hero h1{font-size:36px;line-height:1.08;margin:0 0 10px;font-weight:700;letter-spacing:-.02em}
.hero p{margin:0;color:var(--muted);line-height:1.6;font-size:14px}
.panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.panel.compact{padding:14px}
.panel.pad{padding:18px}
.stack{display:flex;flex-direction:column;gap:14px}
.row{display:flex;align-items:center;gap:10px}
.row.wrap{flex-wrap:wrap}
.row.between{justify-content:space-between}
.grid{display:grid;gap:12px}
.grid.stats{grid-template-columns:repeat(2,minmax(0,1fr))}
.grid.deck{grid-template-columns:1fr}
@media(min-width:740px){
  .grid.deck{grid-template-columns:repeat(2,minmax(0,1fr))}
  .grid.stats{grid-template-columns:repeat(4,minmax(0,1fr))}
}
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.deck-card h3{margin:0 0 4px;font-size:22px;line-height:1.2}
.muted{color:var(--muted)}
.small{font-size:12px}
.tiny{font-size:11px}
.badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:7px 11px;font-size:12px;border:1px solid var(--line);background:#fff}
.badge.good{background:var(--accent-soft);border-color:#c3d8cd;color:var(--accent)}
.badge.warn{background:var(--warn-soft);border-color:#edc2b4;color:var(--warn)}
.badge.gold{background:var(--gold-soft);border-color:#eadcab;color:var(--gold)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:44px;padding:11px 16px;border-radius:14px;border:1px solid var(--line);background:#fff;color:var(--text);font-weight:600;text-decoration:none}
.btn.primary{background:var(--text);border-color:var(--text);color:#fff}
.btn.accent{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.warn{background:var(--warn);border-color:var(--warn);color:#fff}
.btn.soft{background:#fff}
.btn.ghost{background:transparent}
.btn.small{min-height:36px;padding:8px 12px;font-size:13px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.icon-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:#fff;display:inline-flex;align-items:center;justify-content:center}
.icon-btn.small{width:34px;height:34px}
.progress{height:9px;background:#e9e0cd;border-radius:999px;overflow:hidden}
.progress > span{display:block;height:100%;background:var(--accent);transition:width .2s ease}
.kpis{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.kpi{padding:14px;border:1px solid var(--line);border-radius:18px;background:#fff}
.kpi-label{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.kpi-value{font-size:24px;font-weight:700;margin-top:6px}
.toggle-group{display:flex;flex-wrap:wrap;gap:8px}
.toggle{min-height:38px;padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted);font-size:13px}
.toggle.active{background:var(--text);border-color:var(--text);color:#fff}
.segmented{display:grid;gap:4px;background:#e8deca;border:1px solid var(--line);border-radius:18px;padding:4px}
.seg-btn{min-height:40px;padding:8px 10px;border-radius:14px;background:transparent;color:var(--muted);font-size:13px;font-weight:700}
.seg-btn.active{background:#fff;color:var(--text);box-shadow:0 1px 0 rgba(31,26,20,.04),0 6px 14px rgba(31,26,20,.06)}
.switch-list{display:grid;gap:10px}
.switch-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:16px;background:#fff}
.switch-copy{min-width:0;flex:1}
.switch-copy strong{display:block;font-size:14px}
.switch-copy span{display:block;margin-top:4px;font-size:12px;line-height:1.5;color:var(--muted)}
.switch-btn{position:relative;width:54px;height:32px;border-radius:999px;background:#d8cfbb;border:1px solid #cabfa9;flex:0 0 auto;transition:background .2s ease}
.switch-btn::after{content:'';position:absolute;top:2px;left:2px;width:26px;height:26px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(31,26,20,.16);transition:transform .2s ease}
.switch-btn.active{background:var(--accent);border-color:var(--accent)}
.switch-btn.active::after{transform:translateX(22px)}
.kind-tag{display:inline-flex;align-items:center;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:700;letter-spacing:.02em;background:#f6f0e3;color:var(--muted);border:1px solid var(--line)}
.kind-tag.word{background:#f7f1e6;color:#8b6f2b;border-color:#eadcab}
.kind-tag.phrase{background:#eef4f1;color:var(--accent);border-color:#c3d8cd}
.kind-tag.sentence{background:#f1effb;color:#5c4b95;border-color:#d2cbf0}
.kind-tag.mini{background:#f8e9f0;color:#a34f72;border-color:#e9bfd0}
.study-head{display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
@media(min-width:740px){
  .study-head{flex-direction:row;align-items:flex-start;justify-content:space-between}
}
.study-main{display:grid;gap:14px}
@media(min-width:780px){
  .study-main{grid-template-columns:minmax(0,1.25fr) minmax(280px,.75fr);align-items:start}
}
.question-card{padding:22px}
.prompt-label{font-size:12px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
.prompt-main{font-size:28px;line-height:1.35;font-weight:700;letter-spacing:-.02em;word-break:break-word;white-space:pre-line}
.prompt-sub{margin-top:12px;color:var(--muted);line-height:1.6;font-size:14px}
.answer-block{display:flex;flex-direction:column;gap:14px;padding-top:10px}
.answer-main{font-size:30px;line-height:1.25;font-weight:800;letter-spacing:-.02em;word-break:break-word;white-space:pre-line}
.answer-sub{font-size:16px;line-height:1.6;white-space:pre-line}
.example-list{display:flex;flex-direction:column;gap:10px}
.example{border:1px solid var(--line);border-radius:16px;padding:12px;background:#fff}
.example .en{font-size:15px;line-height:1.6;white-space:pre-line}
.example .jp{margin-top:6px;font-size:14px;color:var(--muted);line-height:1.6;white-space:pre-line}
.example-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.note-box{border-radius:16px;background:#fff;border:1px solid var(--line);padding:12px}
.note-box h4{margin:0 0 8px;font-size:12px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.note-box p{margin:0;line-height:1.65;white-space:pre-line}
.rating-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.rating-row .btn{min-height:54px}
.typing-box{display:flex;flex-direction:column;gap:12px}
.typing-box input,.field input,.field textarea,.field select{
  width:100%;border:1px solid var(--line);background:#fff;border-radius:14px;padding:13px 14px;color:var(--text);outline:none
}
.field textarea{min-height:92px;resize:vertical}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
.hint{font-size:13px;line-height:1.6;color:var(--muted)}
.message{padding:12px 14px;border-radius:14px;font-size:14px;line-height:1.6}
.message.good{background:var(--accent-soft);color:var(--accent)}
.message.warn{background:var(--warn-soft);color:var(--warn)}
.message.info{background:#f2efe7;color:var(--muted)}
.audio-settings{display:grid;gap:12px;padding-top:10px}
.settings-grid{display:grid;gap:12px}
@media(min-width:700px){.settings-grid{grid-template-columns:1fr 1fr}}
.range-wrap{display:flex;align-items:center;gap:12px}
.range-wrap input[type="range"]{flex:1}
.study-aside{display:flex;flex-direction:column;gap:14px}
.status-block{display:flex;flex-wrap:wrap;gap:8px}
.footer-note{margin-top:18px;text-align:center;color:var(--muted);font-size:12px;line-height:1.6}
.reader-layout{display:grid;gap:14px}
@media(min-width:900px){.reader-layout{grid-template-columns:minmax(0,1.2fr) minmax(300px,.8fr);align-items:start}}
.reader-article{font-size:18px;line-height:1.95;word-break:break-word}
.reader-token{display:inline;padding:2px 5px;margin:0 1px;border-radius:8px;border:1px solid transparent;background:transparent;color:inherit;font:inherit;cursor:pointer}
.reader-token:hover{background:#f5efe2;border-color:#e5d9c1}
.reader-token.selected{background:var(--accent-soft);border-color:#c3d8cd;color:var(--accent);font-weight:700}
.reader-token.known{background:#f7f1e6;border-color:#eadcab;color:#8b6f2b}
.reader-pick{padding:12px;border:1px solid var(--line);border-radius:16px;background:#fff}
.reader-pick h4{margin:0;font-size:18px;line-height:1.2}
.reader-pick .meta{font-size:12px;color:var(--muted);line-height:1.5;margin-top:6px}
.reader-pick .snippet{margin-top:8px;padding:10px;border-radius:12px;background:#faf7ef;border:1px solid var(--line);font-size:13px;line-height:1.6;color:var(--text)}
.reader-empty{padding:20px 10px;color:var(--muted);text-align:center;line-height:1.7}
.helper-box{border-radius:16px;border:1px dashed var(--line-strong);padding:12px;background:#f8f3e8}
.helper-box strong{display:block;font-size:13px;margin-bottom:6px}
.context-block{margin-top:14px;padding:12px;border:1px solid var(--line);border-radius:16px;background:#f7f2e7}
.context-block .label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.study-screen{padding-bottom:132px}
.study-dock-wrap{position:sticky;bottom:calc(10px + var(--safe-bottom));z-index:24;margin-top:16px}
.study-dock{display:grid;grid-template-columns:minmax(108px,.72fr) minmax(0,1fr);gap:10px;padding:10px;border:1px solid var(--line);border-radius:20px;background:rgba(251,247,238,.96);backdrop-filter:blur(10px);box-shadow:var(--shadow)}
.study-dock.typing{grid-template-columns:minmax(96px,.62fr) minmax(0,.92fr) minmax(0,1.08fr)}
.study-dock .btn{min-height:52px}
.study-dock .btn.primary:disabled{background:#d8cfbb;border-color:#d8cfbb;color:#6f6455}
.study-dock .btn:disabled{opacity:1}
.prompt-jp-helper{margin-top:8px;font-size:12px;color:var(--muted);line-height:1.6}
.reader-token.ignored{padding:0;margin:0;border:none;background:transparent;color:inherit;cursor:text}
.reader-pick .subhead{margin-top:10px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.suggestion-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.suggestion-chip{display:inline-flex;align-items:center;gap:6px;min-height:36px;padding:8px 10px;border-radius:999px;border:1px solid var(--line);background:#faf7ef;color:var(--text);font-size:12px;font-weight:700}
.suggestion-chip span{font-size:11px;color:var(--muted);font-weight:600}
.suggestion-chip.selected{background:var(--accent-soft);border-color:#c3d8cd;color:var(--accent)}
.reader-inline-note{margin-top:8px;font-size:12px;color:var(--muted);line-height:1.6}
.list{display:flex;flex-direction:column;gap:10px}
.card-item{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:14px;border:1px solid var(--line);border-radius:18px;background:#fff}
.card-item h4{margin:0 0 4px;font-size:18px;line-height:1.25}
.card-item p{margin:0;color:var(--muted);line-height:1.5}
.pill-group{display:flex;flex-wrap:wrap;gap:6px}
.pill{padding:4px 8px;border-radius:999px;font-size:11px;border:1px solid var(--line);background:#faf8f2;color:var(--muted)}
.section-title{font-size:18px;font-weight:700;margin:0 0 10px}
hr.sep{border:none;border-top:1px solid var(--line);margin:6px 0 0}
.empty{padding:34px 18px;text-align:center;color:var(--muted)}
.modal-backdrop{position:fixed;inset:0;background:rgba(31,26,20,.28);display:flex;align-items:flex-end;justify-content:center;padding:16px;z-index:40}
@media(min-width:700px){.modal-backdrop{align-items:center}}
.modal{width:min(760px,100%);max-height:min(88vh,920px);overflow:auto;background:var(--paper);border-radius:24px;border:1px solid var(--line);box-shadow:0 24px 48px rgba(31,26,20,.24);padding:18px}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);padding:12px 16px;border-radius:999px;background:#171310;color:#fff;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.2);z-index:60}
.offline-banner{padding:13px 14px;border-radius:18px;border:1px solid #d7e6de;background:#f3faf6;color:var(--accent);font-size:13px;line-height:1.6}
.linkish{color:var(--accent);font-weight:600}
.right{margin-left:auto}
.center{text-align:center}
.m0{margin:0}
.mt6{margin-top:6px}
.mt8{margin-top:8px}
.mt12{margin-top:12px}
.mt14{margin-top:14px}
.mt18{margin-top:18px}
.mt22{margin-top:22px}
.hidden{display:none!important}

.drive-layout{display:grid;gap:14px}
@media(min-width:900px){.drive-layout{grid-template-columns:minmax(0,1.2fr) minmax(300px,.8fr);align-items:start}}
.drive-preview{display:flex;flex-direction:column;gap:14px}
.drive-main{font-size:30px;line-height:1.25;font-weight:800;letter-spacing:-.02em;word-break:break-word;white-space:pre-line}
.drive-sub{font-size:18px;line-height:1.7;color:var(--muted);white-space:pre-line}
.drive-script{display:flex;flex-direction:column;gap:10px}
.drive-step{padding:12px 14px;border:1px solid var(--line);border-radius:16px;background:#fff}
.drive-step.jp{background:#faf7ef}
.drive-step .label{font-size:12px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.drive-step-text{font-size:16px;line-height:1.7;white-space:pre-line}
.drive-queue-item{width:100%;text-align:left;padding:12px;border:1px solid var(--line);border-radius:16px;background:#fff;display:flex;flex-direction:column;gap:8px}
.drive-queue-item.current{border-color:#c3d8cd;background:var(--accent-soft)}
.drive-queue-item .top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.drive-queue-item h4{margin:0;font-size:17px;line-height:1.3}
.drive-queue-item p{margin:0;color:var(--muted);font-size:13px;line-height:1.6}
.drive-note{padding:12px 14px;border:1px dashed var(--line-strong);border-radius:16px;background:#fffaf1;color:var(--muted);line-height:1.7;font-size:13px}
.drive-step.current{background:var(--accent-soft);border-color:#c3d8cd}
.drive-step.current.jp{background:#f8efe7;border-color:#edc2b4}
.drive-step .row.between{align-items:flex-start}
.drive-live{padding:18px;border:1px solid var(--line);border-radius:20px;background:#fff;display:flex;flex-direction:column;gap:12px}
.drive-live.slide{min-height:220px;justify-content:center}
.drive-live.script{padding:14px}
.drive-live-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.drive-live-title{font-size:12px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
.drive-live-main{font-size:clamp(28px,4.2vw,42px);line-height:1.35;font-weight:800;letter-spacing:-.02em;word-break:break-word;white-space:pre-line}
.drive-live-sub-block{display:flex;flex-direction:column;gap:6px}
.drive-live-sub-label{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.drive-live-sub-text{font-size:16px;line-height:1.7;color:var(--muted);white-space:pre-line}
.drive-script-list{display:flex;flex-direction:column;gap:10px;max-height:420px;overflow:auto;padding-right:4px}
.drive-script-item{padding:12px 14px;border:1px solid var(--line);border-radius:16px;background:#fff;display:flex;flex-direction:column;gap:8px;scroll-margin:18px}
.drive-script-item.current{background:var(--accent-soft);border-color:#c3d8cd}
.drive-script-item.current.jp{background:#f8efe7;border-color:#edc2b4}
.drive-script-item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.drive-script-item-label{font-size:12px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.drive-script-item-text{font-size:18px;line-height:1.7;white-space:pre-line}
.drive-script-item-sub{display:flex;flex-direction:column;gap:4px}
.drive-script-item-sub-label{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.drive-script-item-sub-text{font-size:14px;line-height:1.6;color:var(--muted);white-space:pre-line}

</style>
</head>
<body>
<div id="app"></div>

const PRESET_SOURCE = {"core10": [{"word": "report", "meaning": "報告書", "examples": [{"en": "I'm working on the weekly report.", "jp": "週報を作成しています。"}, {"en": "Please send the final report by Friday.", "jp": "最終報告書は金曜日までに送ってください。"}], "tip": "work on a report / send a report の形でよく使います。"}, {"word": "schedule", "meaning": "日程、予定", "examples": [{"en": "Could you confirm the schedule for tomorrow?", "jp": "明日の予定を確認していただけますか。"}, {"en": "We need to change the project schedule.", "jp": "プロジェクトの日程を変更する必要があります。"}], "tip": "confirm the schedule / change the schedule が基本です。"}, {"word": "meeting", "meaning": "会議", "examples": [{"en": "I can join the meeting at 2 p.m.", "jp": "午後2時の会議には参加できます。"}, {"en": "The meeting starts at 10 a.m.", "jp": "会議は午前10時に始まります。"}]}, {"word": "file", "meaning": "ファイル", "examples": [{"en": "I'll send you the file this afternoon.", "jp": "今日の午後にファイルを送ります。"}, {"en": "Could you open the attached file?", "jp": "添付ファイルを開いていただけますか。"}]}, {"word": "document", "meaning": "文書、資料", "examples": [{"en": "Please review the attached document.", "jp": "添付資料をご確認ください。"}, {"en": "I'm updating the document now.", "jp": "今その資料を更新しています。"}]}, {"word": "issue", "meaning": "問題、課題", "examples": [{"en": "We need to discuss this issue today.", "jp": "この課題は今日話し合う必要があります。"}, {"en": "There is an issue with the login system.", "jp": "ログインシステムに問題があります。"}], "tip": "problem より少し仕事向きで、会議やメールでよく使います。"}, {"word": "deadline", "meaning": "締切", "examples": [{"en": "The deadline is Friday afternoon.", "jp": "締切は金曜の午後です。"}, {"en": "Can we extend the deadline by one day?", "jp": "締切を1日延ばせますか。"}]}, {"word": "update", "meaning": "更新、進捗報告", "examples": [{"en": "I'll share an update after lunch.", "jp": "昼食後に進捗を共有します。"}, {"en": "Do you have any updates on this task?", "jp": "このタスクの進捗はありますか。"}]}, {"word": "client", "meaning": "顧客、取引先", "examples": [{"en": "I have a call with the client tomorrow.", "jp": "明日クライアントと通話があります。"}, {"en": "The client asked for a revised quote.", "jp": "クライアントが修正版の見積もりを求めています function uid() {
  return 'id-' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-5);
}

function deepClone(obj) {
  return JSON.parse(JSON.stringify(obj));
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatDateTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  const yy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const hh = String(d.getHours()).padStart(2, '0');
  const mi = String(d.getMinutes()).padStart(2, '0');
  return `${yy}/${mm}/${dd} ${hh}:${mi}`;
}

function defaultTip(word) {
  if ((word || '').includes('...')) return '「...」の部分に内容や相手を入れて使います。';
  if (/^please /i.test(word)) return 'メールや依頼でそのまま使いやすい形です。';
  if (/^could you /i.test(word)) return '依頼や確認で使う、ていねいな表現です。';
  return '';
}

  all: '全部',
  word: '単語',

};

function normalizeKind(kind, word = '', meaning = '') {
  const raw = String(kind || '').trim().toLowerCase();
  const aliases = {
    all: 'all',
    word: 'word',
    words: 'word',
    vocabulary: 'word',
    vocab: 'word',
    '単語': 'word',
    '語': 'word',
    phrase: 'phrase',
    phrases: 'phrase',
    chunk: 'phrase',
    chunks: 'phrase',
    collocation: 'phrase',
    collocations: 'phrase',
    idiom: 'phrase',
    idioms: 'phrase',
    '熟語': 'phrase',
    'フレーズ': 'phrase',
    '連語': 'phrase',
    sentence: 'sentence',
    sentences: 'sentence',
    line: 'sentence',
    '文': 'sentence',
    '英文': 'sentence',
    mini: 'mini',
    script: 'mini',
    scripts: 'mini',
    paragraph: 'mini',
    paragraphs: 'mini',
    long: 'mini',
    practical: 'mini',
    'ミニ': 'mini',
    'ミニ実務': 'mini',
    '長文': 'mini',
    '会話': 'mini',
    '短文会話': 'mini'
  };
  if (aliases[raw]) return aliases[raw];
  const w = String(word || '').trim();
  const m = String(meaning || '').trim();
  if (w.includes('\n') || m.includes('\n')) return 'mini';
  const tokenCount = w.split(/\s+/).filter(Boolean).length;
  if (/[.!?]$/.test(w) && tokenCount >= 4) return 'sentence';
  if (tokenCount >= 2 || w.includes('...')) return 'phrase';
  return 'word';
}

function kindLabel(kind) {

function kindInstruction(kind, direction) {
  const normalized = normalizeKind(kind);
  const isJpEn = direction === 'jp-en';
  if (normalized === 'word') return isJpEn ? 'まず1語で出してから答えを見ます。' : '意味を1語で思い出してから答えを見ます。';
  if (normalized === 'phrase') return isJpEn ? 'まずフレーズを口に出してから答えを見ます。' : '意味を短く思い出してから答えを見ます。';
  if (normalized === 'sentence') return isJpEn ? 'まず1文で言ってから答えを見ます。' : '意味を一文で思い出してから答えを見ます。';
  if (normalized === 'mini') return isJpEn ? '2〜4文でざっくり言ってから答えを見ます。' : '要点を日本語でまとめてから答えを見ます。';
  return isJpEn ? 'まず口に出してから答えを見ます。' : '意味を思い出してから答えを見ます。';
}

function previewText(value, maxLen = 84) {
  const oneLine = String(value || '').replace(/\s*\n\s*/g, ' / ').trim();
  if (oneLine.length <= maxLen) return oneLine;
  return oneLine.slice(0, maxLen - 1) + '…';
}

function normalizeExamples(examples, fallbackExample, fallbackTranslation) {
  const out = [];
  const pushOne = (en, jp = '') => {
    const enText = String(en || '').trim();
    const jpText = String(jp || '').trim();
    if (!enText) return;
    const key = (enText + '|' + jpText).toLowerCase();
    if (out.some(item => (item.en + '|' + item.jp).toLowerCase() === key)) return;
    out.push({ en: enText, jp: jpText });
  };
  if (Array.isArray(examples)) {
    examples.forEach((item) => {
      if (typeof item === 'string') pushOne(item, '');
      else if (item && typeof item === 'object') pushOne(item.en || item.example || item.sentence, item.jp || item.translation || '');
    });
  }
  if (out.length === 0 && fallbackExample) pushOne(fallbackExample, fallbackTranslation || '');
  return out.slice(0, 6);
}

function inferBox(card) {
  if (Number.isFinite(card && card.box)) return card.box;
  if ((card && card.status) === 'known') return 4;
  if ((card && card.status) === 'review') return 1;
  return 0;
}

function inferDueAt(card, now = Date.now()) {
  if (Number.isFinite(card && card.dueAt)) return card.dueAt;
  if ((card && card.status) === 'known') return now + 7 * DAY;
  return now;
}

function normalizeCard(card) {
  const word = String((card && (card.word || card.term || card.english || card.phrase)) || '').trim();
  const meaning = String((card && (card.meaning || card.japanese || card.jp || card.definition)) || '').trim();
  const examples = normalizeExamples(card && card.examples, card && card.example, card && card.exampleJp);
  const kind = normalizeKind(card && (card.kind || card.type), word, meaning);
  return {
    id: (card && card.id) || uid(),
    kind,
    word,
    meaning,
    examples,
    note: String((card && (card.note || card.memo)) || '').trim(),
    tip: String((card && card.tip) || defaultTip(word)).trim(),
    status: (card && card.status) || 'new',
    box: inferBox(card),
    dueAt: inferDueAt(card),
    streak: Number.isFinite(card && card.streak) ? card.streak : 0,
    lapses: Number.isFinite(card && card.lapses) ? card.lapses : 0,
    starred: !!(card && card.starred),
    lastReviewedAt: Number.isFinite(card && card.lastReviewedAt) ? card.lastReviewedAt : null,
  };
}

    id: (deck && deck.id) || uid(),
    presetKey: deck && deck.presetKey ? String(deck.presetKey) : undefined,
    sortOrder: Number.isFinite(deck && deck.sortOrder) ? deck.sortOrder : 999,
    name: String((deck && deck.name) || '新しいデッキ').trim() || '新しいデッキ',
    createdAt: Number.isFinite(deck && deck.createdAt) ? deck.createdAt : Date.now(),
    cards: Array.isArray(deck && deck.cards) ? deck.cards.map(normalizeCard).filter(card => card.word && card.meaning) : [],
  };
}

function normalizeData(data) {
  const decks = {};
  const rawDecks = data && data.decks ? data.decks : {};
  Object.entries(rawDecks).forEach(([key, deck]) => {
    const normalized = normalizeDeck(deck);
    decks[key || normalized.id] = normalized;
  });
  return { decks };
}

function makeCardKey(card) {
  return `${normalizeKind(card.kind, card.word, card.meaning)}|${String(card.word || '').trim()}|${String(card.meaning || '').trim()}`.toLowerCase();
}

function withKind(cards, kind) {
  return (cards || []).map(card => ({ ...card, kind }));
}

function sentenceCardFromPhrase(item, exampleIndex = 0) {
  const examples = Array.isArray(item && item.examples) ? item.examples : [];
  const primary = examples[exampleIndex] || examples[0] || {};
  const rest = examples.filter((_, idx) => idx !== exampleIndex);
  return {
    kind: 'sentence',
    word: primary.en || item.word || '',
    meaning: primary.jp || item.meaning || '',
    examples: rest,
    note: item.word ? `もとのフレーズ: ${item.word}` : '',
    tip: 'この一文をそのまま言える状態を目指します。'
  };
}

function buildSentenceCards(groups) {
  const selection = [
    groups.reporting12[1],

    groups.meeting12[5],
    groups.meeting12[9],
  ].filter(Boolean);
  return selection.map(item => sentenceCardFromPhrase(item, 0));
}

}
const PRESET_DECK_DEFINITIONS = buildPresetDeckDefinitions();
const PRESET_BY_KEY = Object.fromEntries(PRESET_DECK_DEFINITIONS.map(def => [def.key, def]));

function createPresetDeck(def, createdAt) {
  return {
    id: uid(),
    presetKey: def.key,
    sortOrder: def.sortOrder,
    name: def.name,
    createdAt: createdAt || Date.now(),
    cards: (def.cards || []).map(card => normalizeCard(card)),
  };
}

function createInitialData() {
  const base = Date.now();
  const decks = {};
  PRESET_DECK_DEFINITIONS.forEach((def, index) => {
    const deck = createPresetDeck(def, base + index);
    decks[deck.id] = deck;
  });
  return { decks };
}

function dedupeExamples(examples) {
  return normalizeExamples(examples || []);
}

function upgradePresetDeck(existingDeck, def) {
  const oldMap = new Map((existingDeck.cards || []).map(card => [makeCardKey(card), normalizeCard(card)]));
  const newCards = (def.cards || []).map(raw => {
    const normalizedNew = normalizeCard(raw);
    const old = oldMap.get(makeCardKey(normalizedNew));
    if (!old) return normalizedNew;
    return {
      ...normalizedNew,
      id: old.id || normalizedNew.id,
      note: old.note || normalizedNew.note,
      tip: normalizedNew.tip || old.tip,
      examples: dedupeExamples([...(normalizedNew.examples || []), ...(old.examples || [])]),
      status: old.status || normalizedNew.status,
      box: Number.isFinite(old.box) ? old.box : normalizedNew.box,
      dueAt: Number.isFinite(old.dueAt) ? old.dueAt : normalizedNew.dueAt,
      streak: Number.isFinite(old.streak) ? old.streak : normalizedNew.streak,
      lapses: Number.isFinite(old.lapses) ? old.lapses : normalizedNew.lapses,
      starred: !!old.starred,
      lastReviewedAt: Number.isFinite(old.lastReviewedAt) ? old.lastReviewedAt : normalizedNew.lastReviewedAt,
    };
  });
  return normalizeDeck({
    ...existingDeck,
    presetKey: def.key,
    sortOrder: def.sortOrder,
    name: def.name,
    cards: newCards,
  });
}

function mergePresetData(data) {
  const normalized = normalizeData(data);
  const decks = { ...normalized.decks };
  const presetEntries = Object.entries(decks).filter(([, deck]) => deck.presetKey && PRESET_BY_KEY[deck.presetKey]);
  const presentKeys = new Set(presetEntries.map(([, deck]) => deck.presetKey));

  presetEntries.forEach(([id, deck]) => {
    const def = PRESET_BY_KEY[deck.presetKey];
    if (def) decks[id] = upgradePresetDeck(deck, def);
  });

  PRESET_DECK_DEFINITIONS.forEach((def, index) => {
    if (!presentKeys.has(def.key)) {
      const deck = createPresetDeck(def, Date.now() + index);
      decks[deck.id] = deck;
    }
  });

  return { decks };
}

function loadData() {
  for (const key of STORAGE_KEYS) {

      if (!raw) continue;

    } catch (err) {}
  }
  return createInitialData();
}

function loadPrefs() {
  try {
    const raw = localStorage.getItem(PREFS_KEY);
    if (!raw) return { ...DEFAULT_PREFS };
    const parsed = JSON.parse(raw);
    const merged = { ...DEFAULT_PREFS, ...parsed };
    if (!parsed.answerMode) {
      merged.answerMode = parsed.mode === 'typing' ? 'typing' : DEFAULT_PREFS.answerMode;
    }
    if (!parsed.progression) {
      merged.progression = parsed.mode === 'flip' ? 'cycle' : DEFAULT_PREFS.progression;
    }
    if (!parsed.contextMode) {
      merged.contextMode = DEFAULT_PREFS.contextMode;
    }
    return merged;
  } catch (err) {
    return { ...DEFAULT_PREFS };
  }
}

function buildStudyQueue(deck, source) {
  const now = Date.now();
  let cards = (deck.cards || []).map(normalizeCard);

  if (source === 'today') {
    cards = cards.filter(card => card.status !== 'known' || (card.dueAt || 0) <= now);
  } else if (source === 'review') {
    cards = cards.filter(card => card.status === 'review' || card.box <= 2 || (card.dueAt || 0) <= now);
  } else if (source === 'starred') {
    cards = cards.filter(card => card.starred);
  } else {
    cards = cards.slice();
  }

  if (state.prefs.kindFilter && state.prefs.kindFilter !== 'all') {
    cards = cards.filter(card => normalizeKind(card.kind, card.word, card.meaning) === state.prefs.kindFilter);
  }

  cards.sort((a, b) => {
    const aDue = Number.isFinite(a.dueAt) ? a.dueAt : 0;
    const bDue = Number.isFinite(b.dueAt) ? b.dueAt : 0;
    if (aDue !== bDue) return aDue - bDue;
    if ((b.starred ? 1 : 0) !== (a.starred ? 1 : 0)) return (b.starred ? 1 : 0) - (a.starred ? 1 : 0);
    return a.word.localeCompare(b.word);
  });
  return cards.map(card => card.id);
}

function createStudySession(deckId) {
  const deck = getDeck(deckId);
  const queue = buildStudyQueue(deck, state.prefs.source);
  return {

function moveCycle(delta) {
  if (!state.study || !state.study.queue.length) return;
  const len = state.study.queue.length;
  state.study.index = (state.study.index + delta + len) % len;
  resetCurrentStudyCardState();
  render();
}

function normalizeEnglishText(value) {
  return String(value || '')
    .toLowerCase()
    .replace(/[’]/g, "'")
    .replace(/\.\.\./g, ' ')
    .replace(/[^a-z0-9' ]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function normalizeJapaneseText(value) {
  return String(value || '')
    .replace(/[　\s]/g, '')
    .replace(/[。．、,，]/g, '')
    .trim();
}

function levenshtein(a, b) {
  const aa = a || '';
  const bb = b || '';
  const matrix = Array.from({ length: aa.length + 1 }, () => new Array(bb.length + 1).fill(0));
  for (let i = 0; i <= aa.length; i += 1) matrix[i][0] = i;
  for (let j = 0; j <= bb.length; j += 1) matrix[0][j] = j;
  for (let i = 1; i <= aa.length; i += 1) {
    for (let j = 1; j <= bb.length; j += 1) {
      const cost = aa[i - 1] === bb[j - 1] ? 0 : 1;
      matrix[i][j] = Math.min(
        matrix[i - 1][j] + 1,
        matrix[i][j - 1] + 1,
        matrix[i - 1][j - 1] + cost
      );
    }
  }
  return matrix[aa.length][bb.length];
}

function similarity(a, b) {
  if (!a && !b) return 1;
  const maxLen = Math.max(a.length, b.length, 1);
  return 1 - levenshtein(a, b) / maxLen;
}

function getPromptSide(card) {

  const kind = normalizeKind(card.kind, card.word, card.meaning);

    main: state.prefs.direction === 'jp-en' ? card.meaning : card.word,

}

function getAnswerSide(card) {

    ? { main: card.word, sub: card.meaning }
    : { main: card.meaning, sub: card.word };
}

function importantEnglishTokens(text) {
  return normalizeEnglishText(text)
    .split(' ')
    .filter(Boolean)
    .filter(token => token.length > 1)
    .filter(token => !isEnglishStopword(token));
}

function tokenOverlapScore(input, target) {
  const inputTokens = Array.from(new Set(importantEnglishTokens(input)));
  const targetTokens = Array.from(new Set(importantEnglishTokens(target)));
  if (!targetTokens.length) return 0;
  const matched = targetTokens.filter(token => inputTokens.includes(token)).length;
  return matched / targetTokens.length;
}

function evaluateTyping(input, card) {
  if (state.prefs.direction === 'jp-en') {
    const target = card.word || '';
    const normalizedInput = normalizeEnglishText(input);
    const normalizedTarget = normalizeEnglishText(target);
    if (!normalizedInput) return { level: 'empty', message: '何か入力してから答え合わせしましょう。' };

    if (target.includes('...')) {
      const prefix = normalizeEnglishText(target.split('...')[0]);
      if (normalizedInput.startsWith(prefix) && normalizedInput.length >= prefix.length) {
        return { level: 'good', message: '出だしはOKです。内容を入れて自然に使えています。' };
      }
    }

    if (normalizedInput === normalizedTarget) {
      return { level: 'good', message: 'ぴったりです。' };
    }

    const score = similarity(normalizedInput, normalizedTarget);
    const overlap = tokenOverlapScore(normalizedInput, normalizedTarget);
    const kind = normalizeKind(card.kind, card.word, card.meaning);

    if (kind === 'mini') {
      if (score >= 0.84 || overlap >= 0.72) {
        return { level: 'good', message: 'かなり近いです。ミニ実務は要点がそろっていればOKです。' };
      }
      if (score >= 0.58 || overlap >= 0.45) {
        return { level: 'hard', message: '要点は合っています。語順や抜けだけ確認しましょう。' };
      }
      return { level: 'fail', message: '違いが大きめです。答えを声に出して3回まねましょう。' };
    }

    if (kind === 'sentence') {
      if (score >= 0.88 || overlap >= 0.78) {
        return { level: 'good', message: 'かなり近いです。実務でそのまま使える形です。' };
      }
      if (score >= 0.68 || overlap >= 0.48 || normalizedTarget.startsWith(normalizedInput)) {
        return { level: 'hard', message: '惜しいです。語順か一部の単語を見直しましょう。' };
      }
      return { level: 'fail', message: '違いが大きめです。答えを声に出して確認しましょう。' };
    }

    if (score >= 0.9) {
      return { level: 'good', message: 'かなり近いです。細かいスペルや記号だけ見直せばOKです。' };
    }
    if (score >= 0.72 || overlap >= 0.5 || normalizedTarget.startsWith(normalizedInput)) {
      return { level: 'hard', message: '惜しいです。語順か一部の単語を見直しましょう。' };
    }
    return { level: 'fail', message: '違いが大きめです。答えを声に出して確認しましょう。' };
  }

  const inputNorm = normalizeJapaneseText(input);
  if (!inputNorm) return { level: 'empty', message: '何か入力してから答え合わせしましょう。' };

  const meaning = String(card.meaning || '');
  const variants = [
    meaning,
    ...meaning.split(/[、,\/／・\\n]/)
  ].map(normalizeJapaneseText).filter(Boolean);

  if (variants.some(v => v === inputNorm || v.includes(inputNorm) || inputNorm.includes(v))) {
    return { level: 'good', message: '意味は合っています。' };
  }

  const fullNorm = normalizeJapaneseText(meaning);
  const jpScore = similarity(inputNorm, fullNorm);
  if (jpScore >= 0.7) {
    return { level: 'hard', message: 'だいたい合っています。答えも見て言い換えを確認しましょう。' };
  }
  return { level: 'hard', message: '日本語は言い換えが多いので、近い意味ならOKです。答えも確認しておきましょう。' };
}

function applyReviewResult(card, grade) {
  const now = Date.now();
  let box = Number.isFinite(card.box) ? card.box : 0;
  let dueAt = now;
  let status = 'review';
  let streak = Number.isFinite(card.streak) ? card.streak : 0;
  let lapses = Number.isFinite(card.lapses) ? card.lapses : 0;

  if (grade === 'good') {
    box = Math.min(box + 1, BOX_INTERVALS.length - 1);
    dueAt = now + BOX_INTERVALS[box] * DAY;
    status = box >= 4 ? 'known' : 'review';
    streak += 1;
  } else if (grade === 'hard') {
    box = Math.max(1, box || 1);
    dueAt = now + 12 * 60 * 60 * 1000;
    status = 'review';
    streak = 0;
  } else {
    box = 0;
    dueAt = now;
    status = 'review';
    streak = 0;
    lapses += 1;
  }

  return {
    ...card,
    box,
    dueAt,
    status,
    streak,
    lapses,
    lastReviewedAt: now,
  };
}

function replaceCardInData(deckId, updatedCard) {
  const deck = getDeck(deckId);
  if (!deck) return;
  const cards = deck.cards.map(card => (card.id === updatedCard.id ? normalizeCard(updatedCard) : card));
  state.data = {
    ...state.data,
    decks: {
      ...state.data.decks,
      [deckId]: { ...deck, cards },
    },
  };
  saveData(state.data);
}

function insertRetryCard(cardId, offset) {
  const study = state.study;
  if (!study) return;
  const insertAt = Math.min(study.index + offset, study.queue.length);
  study.queue.splice(insertAt, 0, cardId);
}

function finishCurrentCard(grade) {
  const study = state.study;
  const card = currentCard();
  if (!study || !card) return;

  const updated = applyReviewResult(card, grade);
  replaceCardInData(study.deckId, updated);

  if (grade === 'fail') insertRetryCard(card.id, 2);
  if (grade === 'hard') insertRetryCard(card.id, 4);

  study.stats[grade] += 1;
  study.index += 1;
  study.revealed = false;
  study.checked = false;
  study.typingValue = '';
  study.evaluation = null;
  render();
}

function startStudy(deckId) {
  state.activeDeckId = deckId;

function rebuildStudySession() {

function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text);
  }
  const el = document.createElement('textarea');
  el.value = text;
  document.body.appendChild(el);
  el.select();
  document.execCommand('copy');
  el.remove();
  return Promise.resolve();
}

  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `${filenameBase.replace(/[\\/:*?"<>|]+/g, '_')}_${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

function parseImport(text) {
  const trimmed = String(text || '').trim();
  if (!trimmed) return [];
  if (trimmed.startsWith('[') || trimmed.startsWith('{')) {
    try {
      const parsed = JSON.parse(trimmed);
      if (parsed && parsed.decks) return [];
      const arr = Array.isArray(parsed) ? parsed : [parsed];
      return arr.map(item => normalizeCard(item)).filter(card => card.word && card.meaning);
    } catch (err) {}
  }

  const lines = trimmed.split('\n').map(line => line.trim()).filter(Boolean);
  const cards = [];
  lines.forEach((line) => {
    const sep = line.includes('|') ? '|' : (line.includes('\t') ? '\t' : null);
    if (!sep) return;
    const parts = line.split(sep).map(part => part.trim());
    if (!parts.length) return;

    let kind = '';
    let word = '';
    let meaning = '';
    let ex1en = '';
    let ex1jp = '';
    let ex2en = '';
    let ex2jp = '';
    let note = '';

    const maybeKind = explicitKindToken(parts[0]);
    if (maybeKind && parts.length >= 3) {
      [kind, word, meaning, ex1en, ex1jp, ex2en, ex2jp, note] = parts;
    } else {
      [word, meaning, ex1en, ex1jp, ex2en, ex2jp, note] = parts;
      kind = normalizeKind('', word, meaning);
    }

    if (!word || !meaning) return;
    cards.push(normalizeCard({
      kind,
      word,
      meaning,
      examples: [
        ex1en ? { en: ex1en, jp: ex1jp || '' } : null,
        ex2en ? { en: ex2en, jp: ex2jp || '' } : null
      ].filter(Boolean),
      note: note || '',
      status: 'new',
    }));
  });
  return cards;
}

function updateCard(deckId, cardId, patch) {

function getVoicesForLang(prefix) {
  const voices = state.voices || [];
  const filtered = voices.filter(voice => new RegExp(`^${prefix}(-|_)`, 'i').test(voice.lang || ''));
  return filtered.length ? filtered : voices;
}

function getEnglishVoices() {
  return getVoicesForLang('en');
}

function getJapaneseVoices() {
  return getVoicesForLang('ja');
}

function scoreVoice(voice, preferredLang = 'en') {
  const name = `${voice.name || ''} ${voice.voiceURI || ''}`.toLowerCase();
  const lang = String(voice.lang || '').toLowerCase();
  let score = 0;
  if (lang.startsWith(preferredLang)) score += 40;
  if (/siri|natural|premium|enhanced|compact|alex|samantha|daniel|karen|moira|rishi|serena|ava|kyoko|otoya/i.test(name)) score += 30;
  if (voice.default) score += 8;
  if (voice.localService) score += 5;
  return score;
}

function chooseDefaultVoice(voices, preferredLang = 'en') {
  const list = (voices || []).slice().sort((a, b) => scoreVoice(b, preferredLang) - scoreVoice(a, preferredLang));
  return list[0] || null;
}

function refreshVoices() {
  if (!('speechSynthesis' in window)) {
    state.voices = [];
    return;
  }
  const voices = window.speechSynthesis.getVoices() || [];
  state.voices = voices.slice().sort((a, b) => scoreVoice(b, 'en') - scoreVoice(a, 'en'));

  const englishOptions = getEnglishVoices();
  if (!state.prefs.voiceURI || !englishOptions.some(v => v.voiceURI === state.prefs.voiceURI)) {
    const chosen = chooseDefaultVoice(englishOptions, 'en');
    if (chosen) state.prefs.voiceURI = chosen.voiceURI;
  }

  const japaneseOptions = getJapaneseVoices();
  if (!state.prefs.jpVoiceURI || !japaneseOptions.some(v => v.voiceURI === state.prefs.jpVoiceURI)) {
    const chosen = chooseDefaultVoice(japaneseOptions, 'ja');
    if (chosen) state.prefs.jpVoiceURI = chosen.voiceURI;
  }

  savePrefs(state.prefs);
  if (state.view === 'study' || state.view === 'drive') render();
}

function selectedVoice() {
  const voices = getEnglishVoices();
  return voices.find(voice => voice.voiceURI === state.prefs.voiceURI) || chooseDefaultVoice(voices, 'en') || null;
}

function selectedJapaneseVoice() {
  const voices = getJapaneseVoices();
  return voices.find(voice => voice.voiceURI === state.prefs.jpVoiceURI) || chooseDefaultVoice(voices, 'ja') || null;
}

function selectedVoiceForLang(langKey, explicitVoiceURI = '') {
  if (explicitVoiceURI) {
    return (state.voices || []).find(voice => voice.voiceURI === explicitVoiceURI) || null;
  }
  return langKey === 'ja' ? selectedJapaneseVoice() : selectedVoice();
}

function splitSpeechText(text) {
  return String(text || '')
    .split(/(?<=[.!?;:])\s+/)
    .map(chunk => chunk.trim())
    .filter(Boolean)
    .flatMap(chunk => {
      if (chunk.length <= 180) return [chunk];
      const parts = [];
      let rest = chunk;
      while (rest.length > 180) {
        parts.push(rest.slice(0, 180));
        rest = rest.slice(180);
      }
      if (rest) parts.push(rest);
      return parts;
    });
}

function speakText(text, opts = {}) {
  if (!text) {
    if (typeof opts.onEnd === 'function') opts.onEnd();
    return;
  }
  if (!('speechSynthesis' in window)) {
    if (!opts.quiet) showToast('このブラウザでは読み上げを使えません');
    if (typeof opts.onEnd === 'function') opts.onEnd();
    return;
  }
  refreshVoices();
  const langKey = opts.lang === 'ja' ? 'ja' : 'en';
  const voice = selectedVoiceForLang(langKey, opts.voiceURI || '');
  const chunks = splitSpeechText(text);
  if (!chunks.length) {
    if (typeof opts.onEnd === 'function') opts.onEnd();
    return;
  }
  const defaultRate = langKey === 'ja'
    ? Number(state.prefs.driveJaRate || 1)
    : Number(state.prefs.rate || 0.95);
  const rate = Number.isFinite(opts.rate)
    ? opts.rate
    : (opts.slow ? Number(state.prefs.slowRate || 0.72) : defaultRate);
  let index = 0;
  window.speechSynthesis.cancel();

  const speakNext = () => {
    if (index >= chunks.length) {
      if (typeof opts.onEnd === 'function') opts.onEnd();
      return;
    }
    const utter = new SpeechSynthesisUtterance(chunks[index]);
    if (voice) {
      utter.voice = voice;
      utter.lang = voice.lang || (langKey === 'ja' ? 'ja-JP' : 'en-US');
    } else {
      utter.lang = langKey === 'ja' ? 'ja-JP' : 'en-US';
    }
    utter.rate = rate;
    utter.pitch = 1;
    utter.onend = () => {
      index += 1;
      speakNext();
    };
    utter.onerror = () => {
      index += 1;
      speakNext();
    };
    window.speechSynthesis.speak(utter);
  };

  speakNext();
}

function speakTextAsync(text, opts = {}) {
  return new Promise(resolve => {
    if (!text) {
      resolve();
      return;
    }
    speakText(text, { ...opts, onEnd: () => resolve() });
  });
}

function speakShadow(text) {
  speakText(text, {
    onEnd: () => {
      setTimeout(() => speakText(text, { slow: true }), 280);
    }
  });
}

function stopSpeech() {
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
}

function escapeRegExp(value) {
  return String(value || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function ensureReaderDeckId() {
  if (!state.reader) state.reader = { deckId: null, title: '', text: '', picks: [] };
  if (state.reader.deckId && getDeck(state.reader.deckId)) return;
  const decks = getDecksSorted();
  const custom = decks.find(deck => !deck.presetKey);
  state.reader.deckId = (state.activeDeckId && getDeck(state.activeDeckId) ? state.activeDeckId : ((custom || decks[0] || {}).id || null));
}

function isEnglishStopword(token) {
  return ENGLISH_STOPWORDS.has(readerTokenKey(token));
}

function readerTokenKey(token) {
  return normalizeEnglishText(token).replace(/\s+/g, ' ').trim();
}

function shouldReaderIgnoreToken(token) {
  const key = readerTokenKey(token);
  if (!key) return true;
  if (/^\d+$/.test(key)) return true;
  if (key.length <= 1) return true;
  return isEnglishStopword(key);
}

function splitReaderSentences(text) {
  return String(text || '')
    .split(/(?<=[.!?。！？])\s+|\n+/)
    .map(item => item.trim())
    .filter(Boolean);
}

function tokenizeReaderWords(text) {
  return String(text || '').match(/[A-Za-z][A-Za-z’'\-]*/g) || [];
}

function readerContainsText(text, tokenOrPhrase) {
  const needle = readerTokenKey(tokenOrPhrase);
  if (!needle) return false;
  const hay = ` ${normalizeEnglishText(text)} `;
  return hay.includes(` ${needle} `);
}

function readerTokenSelected(token) {
  const key = readerTokenKey(token);
  return (state.reader.picks || []).some(item => readerTokenKey(item) === key);
}

function tokenizeReaderText(text) {
  const source = String(text || '');
  const regex = /([A-Za-z][A-Za-z’'\-]*)/g;
  const parts = [];
  let lastIndex = 0;
  let match;
  while ((match = regex.exec(source))) {
    if (match.index > lastIndex) {
      parts.push({ type: 'text', value: source.slice(lastIndex, match.index) });
    }
    parts.push({ type: 'token', value: match[0] });
    lastIndex = regex.lastIndex;
  }
  if (lastIndex < source.length) {
    parts.push({ type: 'text', value: source.slice(lastIndex) });
  }
  return parts;
}

function countReaderTokenOccurrences(text, token) {
  const normalized = readerTokenKey(token);
  if (!normalized) return 0;
  const hay = ` ${normalizeEnglishText(text)} `;
  const needle = ` ${normalized} `;
  let count = 0;
  let startIndex = 0;
  while (true) {
    const foundAt = hay.indexOf(needle, startIndex);
    if (foundAt === -1) break;
    count += 1;
    startIndex = foundAt + needle.length;
  }
  return count;
}

function findReaderSnippet(text, token) {
  const sentences = splitReaderSentences(text);
  return sentences.find(sentence => readerContainsText(sentence, token)) || '';
}

function readerDictionaryPhrases(deckId) {
  const out = new Map();
  COMMON_CHUNK_HINTS.forEach(item => out.set(readerTokenKey(item), item));
  const deck = getDeck(deckId);
  if (!deck) return Array.from(out.values());

  (deck.cards || []).forEach(card => {
    const kind = normalizeKind(card.kind, card.word, card.meaning);
    const sources = [];
    if (kind === 'phrase' || (kind === 'word' && readerTokenKey(card.word).includes(' '))) {
      sources.push(card.word);
    }
    (card.examples || []).forEach(ex => {
      const words = readerTokenKey(ex.en).split(' ').filter(Boolean);
      if (words.length >= 2 && words.length <= 5) sources.push(ex.en);
    });
    sources.forEach(source => {
      const normalized = readerTokenKey(source);
      if (!normalized || !normalized.includes(' ')) return;
      out.set(normalized, source.trim());
    });
  });

  return Array.from(out.values());
}

function addReaderSuggestion(map, phrase, score, source) {
  const normalized = readerTokenKey(phrase);
  if (!normalized || !normalized.includes(' ')) return;
  const words = normalized.split(' ').filter(Boolean);
  if (words.length < 2 || words.length > 5) return;
  const existing = map.get(normalized);
  const record = { text: phrase.replace(/\s+/g, ' ').trim(), score, source };
  if (!existing || existing.score < score) map.set(normalized, record);
}

function suggestReaderChunks(token, text, deckId) {
  const tokenKey = readerTokenKey(token);
  if (!tokenKey || tokenKey.includes(' ') || shouldReaderIgnoreToken(tokenKey)) return [];

  const sentences = splitReaderSentences(text).filter(sentence => readerContainsText(sentence, tokenKey)).slice(0, 4);
  if (!sentences.length) return [];

  const suggestions = new Map();
  readerDictionaryPhrases(deckId).forEach(chunk => {
    const normalizedChunk = readerTokenKey(chunk);
    if (!normalizedChunk.includes(tokenKey)) return;
    if (sentences.some(sentence => readerContainsText(sentence, normalizedChunk))) {
      addReaderSuggestion(suggestions, chunk, 140, '定番 / 登録');
    }
  });

  sentences.forEach(sentence => {
    const words = tokenizeReaderWords(sentence);
    words.forEach((word, index) => {
      if (readerTokenKey(word) !== tokenKey) return;
      for (let size = 2; size <= 5; size += 1) {
        const minStart = Math.max(0, index - (size - 1));
        const maxStart = Math.min(index, words.length - size);
        for (let start = minStart; start <= maxStart; start += 1) {
          const slice = words.slice(start, start + size);
          const normalizedSlice = readerTokenKey(slice.join(' '));
          if (!normalizedSlice.includes(tokenKey) || normalizedSlice === tokenKey) continue;
          const contentTokens = slice.map(item => readerTokenKey(item)).filter(item => !isEnglishStopword(item));
          const extraContent = contentTokens.filter(item => item !== tokenKey);
          if (!extraContent.length) continue;

          let score = 70;
          if (size === 3) score += 14;
          else if (size === 4) score += 12;
          else if (size === 2) score += 8;
          else score += 6;
          if (isEnglishStopword(readerTokenKey(slice[0])) || isEnglishStopword(readerTokenKey(slice[slice.length - 1]))) score += 4;
          if (COMMON_CHUNK_HINTS.includes(normalizedSlice)) score += 24;
          addReaderSuggestion(suggestions, slice.join(' '), score, '本文から候補');
        }
      }
    });
  });

  return Array.from(suggestions.values())
    .sort((a, b) => {
      if (b.score !== a.score) return b.score - a.score;
      return a.text.length - b.text.length;
    })
    .slice(0, 4);
}

function getReaderDeckMatch(deckId, token) {
  const deck = getDeck(deckId);
  if (!deck) return null;
  const key = readerTokenKey(token);

  const exact = deck.cards.find(card => {
    if (readerTokenKey(card.word) === key) return true;
    return (card.examples || []).some(ex => readerTokenKey(ex.en) === key);
  });
  if (exact) return exact;

  if (key.includes(' ')) {
    return deck.cards.find(card => {
      const sources = [card.word, ...(card.examples || []).map(ex => ex.en)];
      return sources.some(source => readerContainsText(source, key) || key.includes(readerTokenKey(source)));
    }) || null;
  }

  if (shouldReaderIgnoreToken(key) || key.length < 3) return null;

  return deck.cards.find(card => {
    const sources = [card.word, ...(card.examples || []).map(ex => ex.en)];
    return sources.some(source => importantEnglishTokens(source).includes(key));
  }) || null;
}

function buildReaderGptPrompt() {
  const pickDetails = readerPickDetails();
  const pickedSection = pickDetails.length
    ? pickDetails.map(detail => {
        const candidateText = (detail.suggestions || []).length
          ? ` / 候補: ${(detail.suggestions || []).map(item => item.text).join(' ; ')}`
          : '';
        return `- ${detail.token}${candidateText}`;
      }).join('\n')
    : '- まだ未選択';

  return `以下の英文を、英語学習用に「読むための支援」として整理してください。

条件:
- 単語単体より、意味のまとまり・熟語・連語を優先してください。
- with, of, was, have などの機能語単体は、まとまりを作る場合以外は除外してください。
- 仕事・ニュースで重要な表現を優先してください。
- 日本語は簡潔で、初心者にも分かるようにしてください。
- 私が気になった箇所は優先して扱ってください。

出力形式:
1. 重要な意味のまとまり 5〜10件
English | 日本語 | ひとことメモ

2. 重要単語 5〜10件
English | 日本語 | ひとことメモ

3. 文ごとのやさしい区切り訳
- 1文ずつ、意味のかたまりが分かるように短く区切ってください。

4. カード下書き
kind | word | 日本語 | example1_en | example1_jp | example2_en | example2_jp | note

タイトル:
${state.reader.title || '(なし)'}

気になった箇所:
${pickedSection}

本文:
${(state.reader.text || '').trim()}`;
}

function readerPickDetails() {
  ensureReaderDeckId();
  return (state.reader.picks || []).map(token => {
    const match = getReaderDeckMatch(state.reader.deckId, token);
    return {
      token,
      count: countReaderTokenOccurrences(state.reader.text, token),
      snippet: findReaderSnippet(state.reader.text, token),
      match,
      isPhrase: readerTokenKey(token).includes(' '),
      suggestions: readerTokenKey(token).includes(' ') ? [] : suggestReaderChunks(token, state.reader.text, state.reader.deckId),
    };
  });
}

function renderReaderArticle() {
  const text = state.reader.text || '';
  if (!text.trim()) {
    return '<div class="reader-empty">上の欄に読みたい文章を貼り付けて「本文を表示」を押すと、ここに本文が出ます。</div>';
  }
  return `
    <div class="reader-article">
      ${tokenizeReaderText(text).map(piece => {
        if (piece.type === 'text') {
          return escapeHtml(piece.value).replace(/\n/g, '<br>');
        }
        if (shouldReaderIgnoreToken(piece.value)) {
          return `<span class="reader-token ignored">${escapeHtml(piece.value)}</span>`;
        }
        const selected = readerTokenSelected(piece.value);
        const known = !!getReaderDeckMatch(state.reader.deckId, piece.value);
        return `<button class="reader-token ${selected ? 'selected' : ''} ${known && !selected ? 'known' : ''}" data-action="reader-toggle-pick" data-token="${escapeHtml(piece.value)}">${escapeHtml(piece.value)}</button>`;
      }).join('')}
    </div>
  `;
}

function renderReaderPick(detail) {
  const suggestionsHtml = (detail.suggestions || []).length ? `
    <div class="subhead">まとまり候補</div>
    <div class="reader-inline-note">単語より、このかたまりで覚えると読みやすい候補です。</div>
    <div class="suggestion-list">
      ${(detail.suggestions || []).map(item => {
        const selected = readerTokenSelected(item.text);
        return `<button class="suggestion-chip ${selected ? 'selected' : ''}" data-action="${selected ? 'reader-toggle-pick' : 'reader-add-phrase'}" data-token="${escapeHtml(item.text)}" data-phrase="${escapeHtml(item.text)}">${selected ? '✓' : '＋'} ${escapeHtml(item.text)} <span>${escapeHtml(item.source)}</span></button>`;
      }).join('')}
    </div>` : '';

  return `
    <div class="reader-pick">
      <div class="row between">
        <div>
          <h4>${escapeHtml(detail.token)}</h4>
          <div class="meta">${detail.count}か所で登場${detail.match ? ' · デッキに意味あり' : ''}${detail.isPhrase ? ' · まとまり' : ''}</div>
        </div>
        <div class="row wrap">
          <button class="btn small" data-action="speak-text" data-text="${escapeHtml(detail.token)}">${ICONS.play} 音</button>
          <button class="icon-btn small" data-action="reader-toggle-pick" data-token="${escapeHtml(detail.token)}">×</button>
        </div>
      </div>
      <div class="meta">${detail.match ? `意味: ${escapeHtml(detail.match.meaning)}` : '意味はまだ登録されていません。あとでカード化すると placeholder が入ります。'}</div>
      ${detail.snippet ? `<div class="snippet">${escapeHtml(detail.snippet)}</div>` : ''}
      ${suggestionsHtml}
    </div>
  `;
}

function ensureDriveState() {
  if (!state.drive) {
    state.drive = {
      deckId: null,
      queue: [],
      index: 0,
      playing: false,
      runToken: 0,
      timerId: null,
      activeCardId: null,
      activePartIndex: 0,
    };
  }
}

function ensureDriveDeckId() {
  ensureDriveState();
  if (state.drive.deckId && getDeck(state.drive.deckId)) return;
  const decks = getDecksSorted();
  const custom = decks.find(deck => !deck.presetKey);
  const preferred = (state.activeDeckId && getDeck(state.activeDeckId)) || custom || decks[0] || null;
  state.drive.deckId = preferred ? preferred.id : null;
}

function driveKindAllowed(kind) {
  const mode = state.prefs.driveKindMode || 'word-phrase';
  if (mode === 'all') return true;
  if (mode === 'word') return kind === 'word';
  if (mode === 'phrase') return kind === 'phrase';
  return kind === 'word' || kind === 'phrase';
}

function buildDriveQueue(deckId) {
  const deck = getDeck(deckId);
  if (!deck) return [];
  const now = Date.now();
  let cards = (deck.cards || []).map(normalizeCard);
  const source = state.prefs.driveSource || 'all';

  if (source === 'today') {
    cards = cards.filter(card => card.status !== 'known' || (card.dueAt || 0) <= now);
  } else if (source === 'review') {
    cards = cards.filter(card => card.status === 'review' || card.box <= 2 || (card.dueAt || 0) <= now);
  } else if (source === 'starred') {
    cards = cards.filter(card => card.starred);
  }

  cards = cards.filter(card => driveKindAllowed(normalizeKind(card.kind, card.word, card.meaning)));
  return cards.map(card => card.id);
}

function createDriveSession(deckId) {
  return {
    deckId,
    queue: buildDriveQueue(deckId),
    index: 0,
    playing: false,
    runToken: 0,
    timerId: null,
    activeCardId: null,
    activePartIndex: 0,
  };
}

function rebuildDriveSession(options = {}) {
  ensureDriveDeckId();
  const currentId = options.keepCurrent !== false ? (state.drive.queue || [])[state.drive.index] : null;
  state.drive.queue = buildDriveQueue(state.drive.deckId);
  let nextIndex = 0;
  if (currentId) {
    const found = state.drive.queue.indexOf(currentId);
    if (found !== -1) nextIndex = found;
  }
  if (nextIndex >= state.drive.queue.length) nextIndex = Math.max(0, state.drive.queue.length - 1);
  state.drive.index = nextIndex;
  render();
}

function openDrive(deckId) {
  stopDrivePlayback(false);
  ensureDriveState();
  if (deckId && getDeck(deckId)) {
    state.activeDeckId = deckId;
    state.drive = createDriveSession(deckId);
  } else {
    ensureDriveDeckId();
    state.drive = createDriveSession(state.drive.deckId);
    state.activeDeckId = state.drive.deckId;
  }
  state.view = 'drive';
  render();
}

function driveCurrentCard() {
  ensureDriveDeckId();
  const deck = getDeck(state.drive.deckId);
  const id = (state.drive.queue || [])[state.drive.index];
  return deck ? deck.cards.find(card => card.id === id) || null : null;
}

function driveQueueCards() {
  ensureDriveDeckId();
  const deck = getDeck(state.drive.deckId);
  if (!deck) return [];
  const map = new Map((deck.cards || []).map(card => [card.id, card]));
  return (state.drive.queue || []).map(id => map.get(id)).filter(Boolean);
}

function driveExampleLimit() {
  return Math.max(0, Number(state.prefs.driveExampleCount) || 0);
}

function driveRepeatLimit() {
  return Math.max(0, Number(state.prefs.driveRepeatCount) || 0);
}

function buildDriveParts(card) {
  const kind = normalizeKind(card.kind, card.word, card.meaning);
  const parts = [];
  const headLabel = kind === 'phrase' ? '熟語' : kindLabel(kind);
  if (card.word) {
    parts.push({
      label: headLabel,
      text: card.word,
      lang: 'en',
      rate: Number(state.prefs.driveEnRate || 0.92),
      pairLabel: card.meaning ? '意味' : '',
      pairText: card.meaning || ''
    });
  }
  if (card.meaning) {
    parts.push({
      label: '意味',
      text: card.meaning,
      lang: 'ja',
      rate: Number(state.prefs.driveJaRate || 1),
      pairLabel: card.word ? headLabel : '',
      pairText: card.word || ''
    });
  }
  const examples = (card.examples || []).slice(0, driveExampleLimit());
  examples.forEach((example, idx) => {
    const multi = examples.length > 1;
    const enLabel = multi ? `例文${idx + 1}` : '例文';
    const jpLabel = multi ? `例文${idx + 1}の訳` : '日本語訳';
    if (example.en) {
      parts.push({
        label: enLabel,
        text: example.en,
        lang: 'en',
        rate: Number(state.prefs.driveEnRate || 0.92),
        pairLabel: example.jp ? jpLabel : '',
        pairText: example.jp || ''
      });
    }
    if (example.jp) {
      parts.push({
        label: jpLabel,
        text: example.jp,
        lang: 'ja',
        rate: Number(state.prefs.driveJaRate || 1),
        pairLabel: example.en ? enLabel : '',
        pairText: example.en || ''
      });
    }
    for (let i = 0; i < driveRepeatLimit(); i += 1) {
      if (example.en) {
        parts.push({
          label: driveRepeatLimit() > 1 ? `リピート${i + 1}` : 'リピート',
          text: example.en,
          lang: 'en',
          rate: Number(state.prefs.slowRate || 0.72),
          pairLabel: example.jp ? jpLabel : '',
          pairText: example.jp || ''
        });
      }
    }
  });
  return parts;
}

function buildDriveSegments(card) {
  const parts = buildDriveParts(card);
  const shortGap = 320;
  const longGap = Number(state.prefs.drivePauseMs || 900);
  const segments = [];
  parts.forEach((part, index) => {
    segments.push({ type: 'speech', partIndex: index, ...part });
    segments.push({ type: 'pause', ms: index === parts.length - 1 ? longGap : shortGap, partIndex: index });
  });
  return segments;
}

function clearDriveTimer() {
  ensureDriveState();
  if (state.drive.timerId) {
    clearTimeout(state.drive.timerId);
    state.drive.timerId = null;
  }
}

function stopDrivePlayback(shouldRender = true) {
  ensureDriveState();
  state.drive.playing = false;
  state.drive.runToken += 1;
  clearDriveTimer();
  stopSpeech();
  if (shouldRender) render();
}

function driveWait(ms, token) {
  return new Promise(resolve => {
    if (!ms || ms <= 0 || token !== state.drive.runToken) {
      resolve();
      return;
    }
    clearDriveTimer();
    state.drive.timerId = setTimeout(() => {
      if (state.drive && token === state.drive.runToken) {
        state.drive.timerId = null;
        resolve();
      }
    }, ms);
  });
}

async function playDriveFromCurrent() {
  ensureDriveDeckId();
  if (!(state.drive.queue || []).length) {
    showToast('再生できる単語・熟語がありません');
    return;
  }
  if (!('speechSynthesis' in window)) {
    showToast('このブラウザでは読み上げを使えません');
    return;
  }
  stopDrivePlayback(false);
  if (state.drive.index >= state.drive.queue.length) state.drive.index = 0;
  state.drive.playing = true;
  state.drive.runToken += 1;
  const token = state.drive.runToken;
  render();

  while (token === state.drive.runToken && state.drive.playing) {
    const card = driveCurrentCard();
    if (!card) break;
    const segments = buildDriveSegments(card);
    state.drive.activeCardId = card.id;
    state.drive.activePartIndex = 0;
    render();
    for (const segment of segments) {
      if (token !== state.drive.runToken || !state.drive.playing) return;
      if (segment.type === 'pause') {
        await driveWait(segment.ms, token);
      } else {
        state.drive.activeCardId = card.id;
        state.drive.activePartIndex = segment.partIndex;
        render();
        await speakTextAsync(segment.text, { lang: segment.lang, rate: segment.rate, quiet: true });
      }
    }
    if (token !== state.drive.runToken || !state.drive.playing) return;
    if (state.drive.index >= state.drive.queue.length - 1) {
      state.drive.playing = false;
      render();
      showToast('最後まで再生しました');
      return;
    }
    state.drive.index += 1;
    render();
  }

  state.drive.playing = false;
  render();
}

function driveJumpTo(nextIndex, autoplay = false) {
  ensureDriveDeckId();
  if (!(state.drive.queue || []).length) return;
  const maxIndex = state.drive.queue.length - 1;
  const clamped = Math.max(0, Math.min(nextIndex, maxIndex));
  const shouldResume = autoplay || state.drive.playing;
  stopDrivePlayback(false);
  state.drive.index = clamped;
  render();
  if (shouldResume) playDriveFromCurrent();
}

function driveCounterpartLabel(part) {
  if (part && part.pairLabel) return part.pairLabel;
  return part && part.lang === 'ja' ? '英語' : '日本語訳';
}

function driveActivePartIndex(card, parts) {
  if (!parts.length) return -1;
  if (card && state.drive && state.drive.activeCardId === card.id) {
    const idx = Number(state.drive.activePartIndex);
    if (Number.isInteger(idx) && idx >= 0 && idx < parts.length) return idx;
  }
  return 0;
}

function driveDisplayPayload(part, contentMode) {
  if (!part) return { mainLabel: '', mainText: '', subLabel: '', subText: '' };
  const mode = contentMode || state.prefs.driveDisplayContent || 'both';
  const sameLabel = part.label || (part.lang === 'ja' ? '日本語' : '英語');
  const sameText = part.text || '';
  const counterLabel = driveCounterpartLabel(part);
  const counterText = part.pairText || '';
  if (mode === 'counter') {
    return {
      mainLabel: counterText ? counterLabel : sameLabel,
      mainText: counterText || sameText,
      subLabel: '',
      subText: ''
    };
  }
  if (mode === 'same') {
    return {
      mainLabel: sameLabel,
      mainText: sameText,
      subLabel: '',
      subText: ''
    };
  }
  return {
    mainLabel: sameLabel,
    mainText: sameText,
    subLabel: counterText ? counterLabel : '',
    subText: counterText || ''
  };
}

                ${step.subText ? `
                  <div class="drive-script-item-sub">

      </div>
      <div class="drive-live-main">${escapeHtml(payload.mainText || '')}</div>
      ${payload.subText ? `
        <div class="drive-live-sub-block">
          <div class="drive-live-sub-label">${escapeHtml(payload.subLabel || driveCounterpartLabel(activePart))}</div>
          <div class="drive-live-sub-text">${escapeHtml(payload.subText)}</div>
        </div>
      ` : ''}
    </div>
  `;
}

          </div>
